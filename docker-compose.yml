version: "3.8"

services:
  rss-bot:
    build: .
    container_name: rss-bot-dashboard
    restart: unless-stopped
    ports:
      - "15233:15233"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SERVICE_NAME=${SERVICE_NAME:-RSS Bot}
      - SECRET=${SECRET}
      - NODE_ENV=${NODE_ENV:-production}
    volumes:
      - ./data:/app/data
      - ./sessions:/app/sessions
    env_file:
      - .env
